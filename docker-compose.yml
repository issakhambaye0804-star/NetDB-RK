version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: netdb_rk_postgres
    environment:
      POSTGRES_DB: netdb_rk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - netdb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netdb_rk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Application
  app:
    build: .
    container_name: netdb_rk_app
    environment:
      DB_HOST: postgres
      DB_NAME: netdb_rk
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netdb_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
    driver: local

networks:
  netdb_network:
    driver: bridge
